<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$COCO - X Authentication Callback</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        .callback-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            background-color: #0a0225;
            color: white;
        }
        
        .callback-logo {
            width: 150px;
            margin-bottom: 30px;
        }
        
        .callback-message {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .callback-spinner {
            font-size: 40px;
            color: #FF1493;
            margin-bottom: 30px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .callback-redirect {
            font-size: 16px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <img src="images/transparent images/cocoannounce-transparent.png" alt="COCO Logo" class="callback-logo">
        <div class="callback-message">Connecting your X account...</div>
        <div class="callback-spinner">
            <i class="fas fa-spinner"></i>
        </div>
        <div class="callback-redirect">You will be redirected to the leaderboard shortly.</div>
    </div>
    
    <!-- JavaScript Libraries -->
    <script src="js/main.js"></script>
    <script src="js/x-auth.js"></script>
    
    <script>
        // Initialize X authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Process the callback
            initXAuth();
            
            // Redirect back to leaderboard after a short delay
            setTimeout(() => {
                window.location.href = 'leaderboard.html';
            }, 3000);
        });
    </script>
</body>
</html>
    </script>
</body>
</html>
